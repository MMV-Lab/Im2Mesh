mode: inference

data:
  inference_input:
    dir: "/path/to/data/inference"
    data_type: .tif
    reader_params:
      dimension_order_out: "ZYX"
      C: 0
      T: 0
  inference_output:
    path: "/path/to/output/folder"

  preprocess:
    - module_name: monai.transforms
      func_name: NormalizeIntensity
      params:
        channel_wise: True

    - module_name: mmv_im2im.utils.custom_transforms
      func_name: RecordShapeAndPad
      params:
        k: 16            
        mode: "constant"
        constant_value: 0.0

  postprocess:
    - module_name:  mmv_im2im.utils.custom_transforms
      func_name: RemovePadFromPrediction
      params:
        k: 16
        n_coord_dims: 3   

model:
  framework: nnUnet
  net:
    module_name: monai.networks.nets
    func_name: DynUNet
    params:
      # use the one provided in /lightning_logs/version_n/model_config
      spatial_dims: 3 # 2d or 3d for convolutions
      in_channels: 1 # nuber of channels in the input IM
      out_channels: 2503 # Vector size on this case [v1,...,vn]-> n
      # DynUNet initial values 
      kernel_size: [[3, 3, 3], [3, 3, 3], [3, 3, 3]]
      strides: [[1, 1, 1], [2, 2, 2], [2, 2, 2]]
      upsample_kernel_size: [[2, 2, 2], [2, 2, 2]]
      filters: [32, 64, 128]
      dropout: 0.2
      res_block: True # Enables residual connections standard in modern nnU-Nets
      deep_supervision: False
      task: 'regression'     
  checkpoint: "path/to/weights"
  model_extra:
    cpu_only: False

trainer:
  verbose: True
  params:
    gpus: 1
    precision: 16